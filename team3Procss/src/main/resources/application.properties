# Eureka and Gateway use this name to locate the current backend service.
# This backend is currently treated as processing-service.
spring.application.name=processing-service
server.port=8081

# Local database example
#spring.datasource.url=jdbc:mariadb://localhost:3306/team3
#spring.datasource.username=root
#spring.datasource.password=1493
spring.datasource.url=jdbc:mariadb://100.119.201.17:3306/team3project?allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=root
spring.datasource.password=0000
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Eureka server connection settings (default server port: 8761)
# Use the actual Eureka dashboard host that is currently reachable in the team network.
eureka.client.service-url.defaultZone=http://100.119.201.17:8761/eureka/
eureka.client.register-with-eureka=true
eureka.instance.prefer-ip-address=true
#eureka.instance.ip-address=100.71.98.3
eureka.instance.ip-address=100.122.93.103
eureka.instance.non-secure-port=8081
spring.cloud.inetutils.preferred-networks=100.
eureka.instance.instance-id=${spring.application.name}:${eureka.instance.ip-address}:${server.port}

# JWT
jwt.secret=${JWT_SECRET:my-256-bit-secret-key-for-jwt-signing-and-verification}
app.auth.login-url=http://100.119.201.17:9000/users/login
app.auth.signup-url=http://100.119.201.17:9000/users/signup

# Thymeleaf
