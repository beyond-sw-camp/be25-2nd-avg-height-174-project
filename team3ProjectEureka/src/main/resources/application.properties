# 1. 애플리케이션 이름 설정
spring.application.name=eureka-server

# 2. 서버 포트 설정 (유레카 표준 포트)
server.port=8761

# 3. 유레카 서버 자체 설정
# 서버 본인이 스스로를 등록하지 않도록 설정
eureka.client.register-with-eureka=false
# 다른 유레카 서버로부터 정보를 가져오지 않도록 설정
eureka.client.fetch-registry=false

# 4. Tailscale 가상 네트워크 설정 (중요!)
# 호스트네임 대신 IP 주소를 우선 사용하도록 설정
eureka.instance.prefer-ip-address=true
# JK님의 현재 컴퓨터 Tailscale IP를 입력하세요 (예: 100.x.x.x)
eureka.instance.ip-address=100.119.201.17
# 대시보드 표시용 호스트네임도 가상 IP로 통일
eureka.instance.hostname=100.119.201.17

# 5. 로깅 (선택 사항: 서버 동작 확인용)
logging.level.com.netflix.eureka=INFO
logging.level.com.netflix.discovery=INFO