spring.application.name=team3Project-sourcing

# 1. 공통 설정
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
# 만약 쿼리문을 보고 싶으면 true.
spring.jpa.show-sql=false

# 2. 'local' 프로필을 기본으로 활성화 (중요!)
spring.profiles.include=local

# 3. Dialect 명시 (DB 연결 실패 시에도 명확한 에러 확인 가능)
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect

# 4. 소싱 nanoBanan를 사용하기 위한 fastAPI
fastapi.translate.url=http://localhost:8000/translate

# 5. 한국수출입은행 환율 API
koreaexim.api.authkey=U10WIBOKlRVvlPOwN2MD8OnY5fSVA8LV

# 3. 유레카 서버 연결 설정 (가장 중요!)
# JK님의 Tailscale IP 주소와 유레카 포트(8761)를 정확히 적어주세요.
eureka.client.service-url.defaultZone=http://100.71.98.3:8761/eureka/

# 4. 자신의 위치 등록 설정 (Tailscale 환경 최적화)
# 호스트네임 대신 IP 주소를 사용하여 등록합니다.
eureka.instance.prefer-ip-address=true
# 각 팀원 본인의 현재 Tailscale IP를 직접 입력합니다.
eureka.instance.ip-address=100.71.98.3

# 5. 인스턴스 ID 설정 (중복 등록 방지)
# 서비스이름:랜덤값 형태를 권장합니다.
eureka.instance.instance-id=${spring.application.name}:${random.value}

# 6. 유레카 서버에 자신을 등록하고, 주기적으로 정보를 갱신합니다.
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true