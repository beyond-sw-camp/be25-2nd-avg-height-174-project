spring.application.name=user-service
server.port=8082

# Profile
# dev: 콘솔 출력 중심, default: 실제 메일 발송
spring.profiles.active=default

# UTF-8
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# API Gateway 뒤에서 동작할 때 X-Forwarded-* 헤더를 반영하도록 설정
# sendRedirect, 절대 URL 생성 시 8082가 노출되는 문제 방지
server.forward-headers-strategy=framework

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# MariaDB
spring.datasource.url=${DB_URL:jdbc:mariadb://100.119.201.17:3306/team3project?allowPublicKeyRetrieval=true&useSSL=false}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:0000}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# Thymeleaf
spring.thymeleaf.cache=false

# Devtools
spring.devtools.livereload.enabled=true

# Mail (Gmail SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:vbkh63k@gmail.com}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.connectiontimeout=5000

# Eureka
eureka.client.service-url.defaultZone=${EUREKA_DEFAULT_ZONE:http://100.119.201.17:8761/eureka/}
eureka.client.register-with-eureka=true
eureka.instance.prefer-ip-address=true
eureka.instance.ip-address=${EUREKA_IP:100.70.104.88}
eureka.instance.non-secure-port=${server.port}
spring.cloud.inetutils.preferred-networks=100.
eureka.instance.instance-id=${spring.application.name}:${eureka.instance.ip-address}:${server.port}

# JWT
jwt.secret=${JWT_SECRET:my-256-bit-secret-key-for-jwt-signing-and-verification}
jwt.expiration=21600000

# External URL configuration
# 브라우저 등 외부 클라이언트가 접근하는 기준 주소는 반드시 Gateway 기준
app.gateway-url=${APP_GATEWAY_URL:http://100.119.201.17:9000}
# app.frontend-url=${APP_FRONTEND_URL:http://100.119.201.17:9000}
# 임시 테스트용: 프론트를 로컬 Vue 서버에서 띄우는 동안만 사용
# 팀 통합 후에는 Gateway 주소로 복구
app.frontend-url=${APP_FRONTEND_URL:http://localhost:5173}

# Cookie configuration
# HTTP 환경: secure=false / same-site=Lax
# HTTPS 환경에서 크로스 사이트 쿠키 필요 시: secure=true / same-site=None
app.cookie.secure=${COOKIE_SECURE:false}
app.cookie.same-site=${COOKIE_SAME_SITE:Lax}

# OAuth2 Configuration

# Google OAuth2
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.registration.google.redirect-uri=${app.gateway-url}/login/oauth2/code/google

# Kakao OAuth2
spring.security.oauth2.client.registration.kakao.client-id=${KAKAO_CLIENT_ID}
spring.security.oauth2.client.registration.kakao.client-secret=${KAKAO_CLIENT_SECRET}
spring.security.oauth2.client.registration.kakao.client-authentication-method=client_secret_post
spring.security.oauth2.client.registration.kakao.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.kakao.scope=profile_nickname,profile_image,account_email
spring.security.oauth2.client.registration.kakao.redirect-uri=${app.gateway-url}/login/oauth2/code/kakao
spring.security.oauth2.client.registration.kakao.client-name=Kakao

spring.security.oauth2.client.provider.kakao.authorization-uri=https://kauth.kakao.com/oauth/authorize
spring.security.oauth2.client.provider.kakao.token-uri=https://kauth.kakao.com/oauth/token
spring.security.oauth2.client.provider.kakao.user-info-uri=https://kapi.kakao.com/v2/user/me
spring.security.oauth2.client.provider.kakao.user-name-attribute=id

# Naver OAuth2
spring.security.oauth2.client.registration.naver.client-id=${NAVER_CLIENT_ID}
spring.security.oauth2.client.registration.naver.client-secret=${NAVER_CLIENT_SECRET}
spring.security.oauth2.client.registration.naver.client-authentication-method=client_secret_post
spring.security.oauth2.client.registration.naver.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.naver.scope=name,email,profile_image
spring.security.oauth2.client.registration.naver.redirect-uri=${app.gateway-url}/login/oauth2/code/naver
spring.security.oauth2.client.registration.naver.client-name=Naver

spring.security.oauth2.client.provider.naver.authorization-uri=https://nid.naver.com/oauth2.0/authorize
spring.security.oauth2.client.provider.naver.token-uri=https://nid.naver.com/oauth2.0/token
spring.security.oauth2.client.provider.naver.user-info-uri=https://openapi.naver.com/v1/nid/me
spring.security.oauth2.client.provider.naver.user-name-attribute=response