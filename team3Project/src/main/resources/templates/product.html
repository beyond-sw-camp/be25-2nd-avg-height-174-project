<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${product.productName}">상품 상세</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f5f6f7; font-family: 'Noto Sans KR', sans-serif; }

        /* 상단 네비 */
        .top-nav { background: #1a1a2e; padding: 12px 0; }
        .top-nav .brand { color: #e94560; font-size: 1.5rem; font-weight: 800; text-decoration: none; }
        .top-nav .brand span { color: #fff; }

        /* 상품 선택 사이드바 */
        .product-list-card { background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,.08); }
        .product-list-card .list-title { background: #1a1a2e; color: #fff; padding: 10px 14px; font-size: 0.85rem; font-weight: 600; }
        .product-item { display: flex; align-items: center; gap: 10px; padding: 10px 14px; cursor: pointer; border-bottom: 1px solid #f0f0f0; text-decoration: none; color: inherit; transition: background .15s; }
        .product-item:hover, .product-item.active { background: #f0f4ff; }
        .product-item img { width: 48px; height: 48px; object-fit: cover; border-radius: 6px; border: 1px solid #e0e0e0; }
        .product-item .p-name { font-size: 0.75rem; line-height: 1.4; color: #333; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .product-item .p-price { font-size: 0.8rem; font-weight: 700; color: #e94560; white-space: nowrap; }

        /* 메인 상품 영역 */
        .product-card { background: #fff; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,.08); padding: 24px; }

        /* 이미지 갤러리 */
        .main-image-wrap { position: relative; overflow: hidden; border-radius: 10px; background: #f9f9f9; aspect-ratio: 1; }
        .main-image-wrap img { width: 100%; height: 100%; object-fit: contain; transition: opacity .2s; }
        .thumb-list { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
        .thumb-list img { width: 60px; height: 60px; object-fit: cover; border-radius: 6px; border: 2px solid transparent; cursor: pointer; transition: border-color .2s; }
        .thumb-list img.active, .thumb-list img:hover { border-color: #e94560; }

        /* 상품 정보 */
        .badge-brand { background: #1a1a2e; color: #fff; font-size: 0.72rem; padding: 3px 8px; border-radius: 4px; display: inline-block; margin-bottom: 8px; }
        .product-title { font-size: 1.05rem; font-weight: 700; line-height: 1.5; color: #1a1a2e; }
        .price-row { margin-top: 16px; padding: 14px; background: #fff8f8; border-radius: 8px; border: 1px solid #ffe0e0; }
        .price-original { font-size: 0.85rem; color: #999; text-decoration: line-through; }
        .price-sale { font-size: 1.6rem; font-weight: 800; color: #e94560; }
        .price-shipping { font-size: 0.82rem; color: #555; margin-top: 4px; }

        /* 옵션 */
        .option-section { margin-top: 16px; }
        .option-section label { font-size: 0.85rem; font-weight: 600; color: #444; margin-bottom: 6px; display: block; }
        .option-section select { border-radius: 8px; font-size: 0.88rem; }

        /* 주문 버튼 */
        .btn-order { background: linear-gradient(135deg, #e94560, #c0392b); border: none; color: #fff; font-size: 1rem; font-weight: 700; border-radius: 10px; padding: 14px; width: 100%; margin-top: 16px; letter-spacing: 1px; transition: opacity .2s; }
        .btn-order:hover { opacity: 0.88; color: #fff; }

        /* 설명 이미지 */
        .desc-section { background: #fff; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,.08); padding: 24px; margin-top: 20px; }
        .desc-section h5 { font-weight: 700; color: #1a1a2e; margin-bottom: 16px; padding-bottom: 10px; border-bottom: 2px solid #e94560; }
        .desc-img { width: 100%; border-radius: 8px; margin-bottom: 12px; }

        /* 주문 모달 */
        .modal-header { background: #1a1a2e; color: #fff; border-radius: 10px 10px 0 0; }
        .modal-header .btn-close { filter: invert(1); }
        .modal-title { font-weight: 700; }
        .form-label { font-weight: 600; font-size: 0.88rem; color: #444; }
        .order-product-preview { background: #f5f6f7; border-radius: 8px; padding: 12px; margin-bottom: 16px; font-size: 0.85rem; color: #555; }
        .order-product-preview strong { color: #1a1a2e; display: block; margin-bottom: 4px; font-size: 0.92rem; }
        .btn-submit-order { background: linear-gradient(135deg, #e94560, #c0392b); border: none; font-weight: 700; width: 100%; padding: 12px; border-radius: 8px; font-size: 1rem; }

        /* 알림 토스트 */
        .toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 9999; }
    </style>
</head>
<body>

<!-- 상단 네비 -->
<nav class="top-nav">
    <div class="container">
        <a class="brand" href="/product">Team3 <span>쇼핑</span></a>
    </div>
</nav>

<div class="container py-4">
    <div class="row g-4">

        <!-- 왼쪽: 상품 목록 -->
        <div class="col-lg-2 col-md-3 d-none d-md-block">
            <div class="product-list-card">
                <div class="list-title">전체 상품</div>
                <div th:each="p : ${product.allProducts}">
                    <a th:href="${'/product/' + p.productId}"
                       th:classappend="${p.productId == product.productId} ? ' active' : ''"
                       class="product-item">
                        <img th:src="${p.mainImageUrl}" th:alt="${p.productName}"
                             onerror="this.src='https://via.placeholder.com/48x48?text=N/A'">
                        <div>
                            <div class="p-name" th:text="${p.productName}"></div>
                            <div class="p-price" th:text="${#numbers.formatInteger(p.salePrice, 1, 'COMMA') + '원'}"></div>
                        </div>
                    </a>
                </div>
            </div>
        </div>

        <!-- 가운데+오른쪽: 상품 상세 -->
        <div class="col-lg-10 col-md-9">
            <div class="product-card">
                <div class="row g-4">

                    <!-- 이미지 영역 -->
                    <div class="col-md-5">
                        <div class="main-image-wrap">
                            <img id="mainImage"
                                 th:src="${not #lists.isEmpty(product.mainImageUrls)} ? ${product.mainImageUrls[0]} : 'https://via.placeholder.com/400x400?text=No+Image'"
                                 alt="상품 메인 이미지"
                                 onerror="this.src='https://via.placeholder.com/400x400?text=No+Image'">
                        </div>
                        <div class="thumb-list" id="thumbList">
                            <img th:each="url, stat : ${product.mainImageUrls}"
                                 th:src="${url}"
                                 th:alt="'이미지 ' + ${stat.index + 1}"
                                 th:classappend="${stat.first} ? ' active' : ''"
                                 onclick="changeMainImage(this)"
                                 onerror="this.style.display='none'">
                        </div>
                    </div>

                    <!-- 상품 정보 영역 -->
                    <div class="col-md-7">
                        <span class="badge-brand" th:text="${product.brand}"></span>
                        <h1 class="product-title" th:text="${product.productName}"></h1>

                        <div class="price-row">
                            <div class="price-original"
                                 th:if="${product.originalPrice != null}"
                                 th:text="'정가: ' + ${#numbers.formatInteger(product.originalPrice, 1, 'COMMA') + '원'}"></div>
                            <div class="price-sale"
                                 th:text="${#numbers.formatInteger(product.salePrice, 1, 'COMMA') + '원'}"></div>
                            <div class="price-shipping"
                                 th:text="'배송비: ' + ${product.shippingFee != null ? #numbers.formatInteger(product.shippingFee, 1, 'COMMA') + '원' : '무료'}"></div>
                        </div>

                        <!-- 옵션 선택 -->
                        <div class="option-section" th:if="${not #lists.isEmpty(product.options)}">
                            <label>옵션 선택</label>
                            <select class="form-select" id="optionSelect" onchange="onOptionChange(this)">
                                <option value="" data-price="" data-asin="">-- 옵션을 선택하세요 --</option>
                                <option th:each="opt : ${product.options}"
                                        th:value="${opt.optionId}"
                                        th:text="${opt.optionDimensions + ' [' + opt.stock + ']'}"
                                        th:attr="data-price=${opt.price},data-asin=${opt.optionAsin},data-img=${opt.imageUrl}"
                                        th:selected="${opt.selected}">
                                </option>
                            </select>
                        </div>

                        <!-- 주문하기 버튼 -->
                        <button class="btn btn-order" onclick="openOrderModal()">
                            주문하기
                        </button>

                        <div class="mt-3 text-muted" style="font-size:0.8rem;">
                            <span>&#10003; 안전한 결제</span>&nbsp;&nbsp;
                            <span>&#10003; 빠른 배송</span>&nbsp;&nbsp;
                            <span>&#10003; 쉬운 반품</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 상품 설명 이미지 -->
            <div class="desc-section" th:if="${not #lists.isEmpty(product.descriptionImageUrls)}">
                <h5>상품 상세 정보</h5>
                <div th:each="url : ${product.descriptionImageUrls}">
                    <img th:src="${url}" class="desc-img" alt="상품 설명"
                         onerror="this.style.display='none'">
                </div>
            </div>
        </div>

    </div>
</div>

<!-- 주문하기 모달 -->
<div class="modal fade" id="orderModal" tabindex="-1" aria-labelledby="orderModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content" style="border-radius:12px; overflow:hidden;">
            <div class="modal-header">
                <h5 class="modal-title" id="orderModalLabel">주문 정보 입력</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="닫기"></button>
            </div>
            <div class="modal-body p-4">
                <!-- 주문 상품 미리보기 -->
                <div class="order-product-preview">
                    <strong id="previewProductName" th:text="${product.productName}"></strong>
                    <span>가격: <b id="previewPrice" th:text="${#numbers.formatInteger(product.salePrice, 1, 'COMMA') + '원'}"></b></span>
                </div>

                <form id="orderForm">
                    <input type="hidden" id="orderProductId" th:value="${product.productId}">
                    <input type="hidden" id="orderProductName" th:value="${product.productName}">
                    <input type="hidden" id="orderProductPrice" th:value="${product.salePrice}">

                    <div class="mb-3">
                        <label for="customerName" class="form-label">주문자명 <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="customerName" placeholder="이름을 입력하세요" required>
                    </div>
                    <div class="mb-3">
                        <label for="customerPhone" class="form-label">전화번호 <span class="text-danger">*</span></label>
                        <input type="tel" class="form-control" id="customerPhone" placeholder="010-0000-0000" required>
                    </div>
                    <div class="mb-3">
                        <label for="quantity" class="form-label">수량</label>
                        <input type="number" class="form-control" id="quantity" value="1" min="1" max="99">
                    </div>

                    <button type="submit" class="btn btn-submit-order text-white">
                        주문 완료
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- 토스트 알림 -->
<div class="toast-container">
    <div id="orderToast" class="toast align-items-center text-white border-0" role="alert" aria-live="assertive" aria-atomic="true">
        <div class="d-flex">
            <div class="toast-body" id="toastMessage"></div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="닫기"></button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // 메인 이미지 전환
    function changeMainImage(thumb) {
        document.getElementById('mainImage').src = thumb.src;
        document.querySelectorAll('#thumbList img').forEach(t => t.classList.remove('active'));
        thumb.classList.add('active');
    }

    // 옵션 변경 시 이미지 및 가격 업데이트
    function onOptionChange(select) {
        const option = select.options[select.selectedIndex];
        const imgUrl = option.dataset.img;
        const price = option.dataset.price;

        if (imgUrl && imgUrl.startsWith('http')) {
            document.getElementById('mainImage').src = imgUrl;
        }
        if (price) {
            document.getElementById('previewPrice').textContent =
                Number(price).toLocaleString('ko-KR') + '원';
            document.getElementById('orderProductPrice').value = price;
        }
    }

    // 주문 모달 열기
    function openOrderModal() {
        const modal = new bootstrap.Modal(document.getElementById('orderModal'));
        modal.show();
    }

    // 주문 폼 제출
    document.getElementById('orderForm').addEventListener('submit', async function (e) {
        e.preventDefault();

        const customerName = document.getElementById('customerName').value.trim();
        const customerPhone = document.getElementById('customerPhone').value.trim();
        const quantity = parseInt(document.getElementById('quantity').value) || 1;
        const productId = parseInt(document.getElementById('orderProductId').value);
        const productName = document.getElementById('orderProductName').value;
        const price = parseInt(document.getElementById('orderProductPrice').value);

        if (!customerName || !customerPhone) {
            showToast('주문자명과 전화번호는 필수 입력 항목입니다.', 'danger');
            return;
        }

        const requestBody = {
            userId: 1,
            customerName: customerName,
            customerPhone: customerPhone,
            items: [
                {
                    productId: productId,
                    productName: productName,
                    price: price,
                    quantity: quantity
                }
            ]
        };

        try {
            const submitBtn = document.querySelector('#orderForm button[type="submit"]');
            submitBtn.disabled = true;
            submitBtn.textContent = '처리 중...';

            const response = await fetch('/orders', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(requestBody)
            });

            if (response.ok) {
                const result = await response.json();
                bootstrap.Modal.getInstance(document.getElementById('orderModal')).hide();
                showToast('주문이 완료되었습니다! 주문번호: ' + result.id, 'success');
                document.getElementById('orderForm').reset();
            } else {
                const error = await response.json().catch(() => ({}));
                showToast('주문 실패: ' + (error.message || response.statusText), 'danger');
            }
        } catch (err) {
            showToast('네트워크 오류가 발생했습니다.', 'danger');
        } finally {
            const submitBtn = document.querySelector('#orderForm button[type="submit"]');
            submitBtn.disabled = false;
            submitBtn.textContent = '주문 완료';
        }
    });

    // 토스트 표시
    function showToast(message, type) {
        const toastEl = document.getElementById('orderToast');
        const toastMsg = document.getElementById('toastMessage');
        toastEl.className = 'toast align-items-center text-white border-0 bg-' + type;
        toastMsg.textContent = message;
        const toast = new bootstrap.Toast(toastEl, { delay: 4000 });
        toast.show();
    }
</script>
</body>
</html>
