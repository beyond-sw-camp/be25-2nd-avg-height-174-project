<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>회원가입</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 400px; margin: 50px auto; }
        h2 { font-size: 28px; margin-bottom: 28px; color: #111; }
        .form-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 8px; font-size: 15px; font-weight: 600; color: #212529; }
        input { width: 100%; padding: 12px; box-sizing: border-box; border: 1px solid #ced4da; border-radius: 4px; font-size: 15px; }
        input:focus { outline: none; border-color: #adb5bd; }
        button { border: none; cursor: pointer; font-family: Arial, sans-serif; }
        .main-btn { display: block; width: 100%; box-sizing: border-box; margin-top: 18px; padding: 14px; text-align: center; text-decoration: none; background-color: #f1f3f5; color: #495057; border: 1px solid #ced4da; border-radius: 4px; font-size: 16px; font-weight: 600; }
        .main-btn:hover { background-color: #e9ecef; }
        .back-button-wrap { margin-bottom: 20px; }
        .back-button { background-color: #f1f3f5; color: #495057; border: 1px solid #dee2e6; border-radius: 6px; padding: 10px 16px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s ease; }
        .back-button:hover { background-color: #e9ecef; color: #212529; }
        .error-message { color: #dc3545; background: #f8d7da; padding: 10px; border-radius: 4px; margin-bottom: 18px; }
        .field-error { color: #dc3545; font-size: 0.9em; margin-top: 6px; }
        .input-error { border: 1px solid #dc3545; }
    </style>
</head>
<body>
<div class="back-button-wrap">
    <button type="button" class="back-button" onclick="location.href='/'">← 이전 화면</button>
</div>
<h2>회원가입</h2>
<div th:if="${errorMessage}" class="error-message" th:text="${errorMessage}"></div>
<form th:action="@{/users/signup}" th:object="${user}" method="post">
    <div class="form-group">
        <label for="username">아이디</label>
        <input type="text" id="username" th:field="*{username}" required>
    </div>
    <div class="form-group">
        <label for="password">비밀번호</label>
        <input type="password" id="password" th:field="*{password}" required placeholder="비밀번호는 최소 8자 이상이어야 합니다.">
    </div>
    <div class="form-group">
        <label for="name">이름</label>
        <input type="text" id="name" th:field="*{name}" required placeholder="실명을 입력해주세요.">
    </div>
    <div class="form-group">
        <label for="email">이메일</label>
        <input type="email" id="email" th:field="*{email}" required>
    </div>
    <div class="form-group">
        <label for="phoneNumber">전화번호</label>
        <input type="tel" id="phoneNumber" th:field="*{phoneNumber}" required placeholder="예: 010-1234-5678">
    </div>
    <div class="form-group">
        <label for="nickname">닉네임</label>
        <input type="text" id="nickname" th:field="*{nickname}" required>
    </div>
    <button type="submit" class="main-btn">회원가입</button>
</form>
</body>
</html>
