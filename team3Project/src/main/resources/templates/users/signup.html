<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>회원가입</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 400px; margin: 50px auto; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; }
        input { width: 100%; padding: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #28a745; color: white; border: none; cursor: pointer; }
        button:hover { background: #218838; }
        .login-link { text-align: center; margin-top: 15px; }
    </style>
</head>
<body>
    <h2>회원가입</h2>
    <form th:action="@{/users/signup}" th:object="${user}" method="post">
        <div class="form-group">
            <label for="loginId">로그인 아이디</label>
            <input type="text" id="loginId" th:field="*{loginId}" required>
        </div>
        <div class="form-group">
            <label for="username">아이디</label>
            <input type="text" id="username" th:field="*{username}" required>
        </div>
        <div class="form-group">
            <label for="password">비밀번호</label>
            <input type="password" id="password" th:field="*{password}" required>
        </div>
        <div class="form-group">
            <label for="email">이메일</label>
            <input type="email" id="email" th:field="*{email}" required>
        </div>
        <div class="form-group">
            <label for="nickname">닉네임</label>
            <input type="text" id="nickname" th:field="*{nickname}" required>
        </div>
        <button type="submit">회원가입</button>
    </form>
    <div class="login-link">
        <a th:href="@{/users/login}">로그인으로 돌아가기</a>
    </div>
</body>
</html>
