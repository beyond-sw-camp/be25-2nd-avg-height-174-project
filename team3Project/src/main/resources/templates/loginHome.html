<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>홈</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; text-align: center; }
        .welcome { margin-bottom: 30px; }
        .btn { padding: 10px 20px; margin: 5px; text-decoration: none; display: inline-block; background: #007bff; color: white; border: none; cursor: pointer; border-radius: 4px; }
        .btn:hover { background: #0056b3; }
        .btn-danger { background: #dc3545; }
        .btn-danger:hover { background: #c82333; }
        .btn-secondary { background: #6c757d; }
        .btn-secondary:hover { background: #5a6268; }
        .btn-group { margin-top: 20px; }
    </style>
</head>
<body>
    <h1 class="welcome">
        <span th:text="${user.nickname}">사용자</span>님 환영합니다!
    </h1>
    
    <div class="btn-group">
        <a th:href="@{/users/me}" class="btn">내 정보</a>
        <a th:href="@{/users/update}" class="btn">정보 수정</a>
        <a th:href="@{/users/delete}" class="btn btn-danger">회원 탈퇴</a>
    </div>
    
    <form th:action="@{/users/logout}" method="post">
        <button type="submit" class="btn btn-secondary">로그아웃</button>
    </form>
</body>
</html>
